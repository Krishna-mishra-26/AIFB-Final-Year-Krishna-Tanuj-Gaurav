<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
    <main class="max-w-3xl mx-auto px-6 py-16">
        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-8">
            <h1 class="text-3xl font-bold text-gray-900">AI-Powered Finance Tracker</h1>
            <p class="text-gray-600 mt-3">Your app is running correctly. You can create an account or sign in from here.</p>

            <div class="mt-8 flex flex-wrap gap-3">
                {% if request.user.is_authenticated %}
                    <a href="/logout/" class="inline-block px-5 py-2 rounded-lg bg-red-600 text-white font-medium">Log out</a>
                    <a href="/admin/" class="inline-block px-5 py-2 rounded-lg bg-gray-900 text-white font-medium">Open admin</a>
                {% else %}
                    <a href="/signup/" class="inline-block px-5 py-2 rounded-lg bg-indigo-600 text-white font-medium">Sign up</a>
                    <a href="/login/" class="inline-block px-5 py-2 rounded-lg border border-indigo-600 text-indigo-700 font-medium">Log in</a>
                {% endif %}
            </div>
        </div>
    </main>
</body>
</html>
